<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Tu CSS -->
    <link rel="stylesheet" href="estilos.css" />
  </head>

  <body class="bg-dark">
    <div class="fondo">
      <div
        class="container d-flex justify-content-center align-items-center vh-100"
      >
        <div class="card shadow-lg p-4" style="width: 400px">
          <!-- HEADER -->
          <div class="text-center mb-3">
            <h4 id="main-title" class="fw-bold text-primary">
              Asignación de Tareas
            </h4>
            <small class="text-muted">Unidad Canina</small>
          </div>

          <hr />

          <!-- TITULO -->
          <h5 class="text-center mb-3">Inicio de Sesión</h5>

          <!-- FORM -->
          <form action="inicio.html" method="get">
            <div class="mb-3">
              <label for="username" class="form-label">Usuario</label>
              <input
                type="text"
                id="username"
                name="username"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Iniciar Sesión
            </button>
          </form>

          <!-- FOOTER -->
          <div class="text-center mt-3">
            <small class="text-muted">
              &copy; 2026 Plataforma de Asignación de Tareas </small
            ><br />
            <small>
              <a href="mailto:carlos.degado@uc.ac.cr">Carlos M Delgado R</a>
            </small>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
