    <title>Login</title>
      <link rel="stylesheet" href="estilos.css">

<body>
<div class="container">
        <div class="container-h1">
            <header>
            <div class="h1-login"><h1 id="main-title" class="title">Asignacion de Tareas</h1></div>
            <div class="h2-login"><h2 class="title">Unidad Canina </h2></div>
            </header>
        </div>
        <h1>Inicio de Sesión</h1>
        <div class="contenedor-login">
        <form action="inicio.html" method="get">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required><br><br>
            <input type="submit" value="Iniciar Sesión" class="submit-button-login">
        </form>
        </div>
